name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test-clippy:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # The mobiler CLI + runtime crates (root workspace)
          - name: cli
            dir: "."
          # Demos — each its own standalone workspace
          - name: demo-todo
            dir: demos/todo
          - name: demo-coffee
            dir: demos/coffee
          # Full-stack demo: native members only (domain + server + todo-core);
          # its mobile/web crates are excluded from this workspace.
          - name: demo-fullstack-todo
            dir: demos/fullstack-todo
          # Full-stack SQLx demo: domain + Axum/SQLx server + app-core (web is separate).
          - name: demo-fullstack-sqlx
            dir: demos/fullstack-sqlx
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v5

      # Installs the toolchain + components + targets pinned by rust-toolchain.toml
      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.dir }}

      # Non-gating: pedantic warnings are surfaced in the log but do not fail the
      # build. clippy still fails on errors / failed compilation.
      - name: Clippy
        run: cargo clippy --workspace --all-targets

      - name: Test
        run: cargo test --workspace

      # The READMEs' capability sections are generated from capabilities.json — fail if a
      # capability shipped without regenerating the docs (`cargo run -p xtask -- gen-readme`).
      - name: README capabilities in sync
        if: matrix.name == 'cli'
        run: cargo run -p xtask -- gen-readme --check

  # The web shell is WASM-only (Leptos + gloo-net), so it's checked separately
  # against the wasm target rather than the host.
  web:
    name: web (mobiler-web, wasm)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobiler-web
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust + wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: mobiler-web

      - name: Build (wasm)
        run: cargo build --target wasm32-unknown-unknown

  # The web demos are full Trunk apps (the SAME cores as native, Widget→DOM via
  # mobiler-web). Trunk-build them so a shell change that breaks a demo is caught —
  # building is the CI-friendly check (running them needs a browser/server).
  web-demos:
    name: web demo (${{ matrix.dir }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir:
          - demos/coffee/web
          - demos/todo/web
          - demos/fullstack-todo/web-widgets
          - demos/fullstack-sqlx/web
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust + wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.dir }}

      # Prebuilt Trunk binary (no third-party action / Node runtime). index.html sets
      # data-wasm-opt="0", so no wasm-opt/binaryen is needed.
      - name: Install Trunk
        run: |
          curl -fsSL https://github.com/trunk-rs/trunk/releases/download/v0.21.14/trunk-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xzf - -C "$HOME/.cargo/bin" trunk

      - name: Build (trunk)
        run: trunk build

  # The iOS shell only builds on macOS (uniffi Swift FFI + xcodebuild). Build each
  # demo for the simulator — no signing, no booted sim — so a shell or build-ios.sh
  # regression is caught for free, without the rented Mac. (macOS runners are arm64,
  # so the sim slice is aarch64-apple-ios-sim / arm64.) The iOS shell is kept
  # byte-identical across templates/iOS and the demos, so this guards the template too.
  ios:
    name: iOS build (${{ matrix.app }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - demos/coffee
          - demos/todo
          - demos/fullstack-todo/mobile
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust + iOS simulator target
        run: rustup target add aarch64-apple-ios-sim

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.app }}

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build for the iOS simulator
        run: bash iOS/build-ios.sh

      # Validate the device (iphoneos) build too — unsigned compile-check, no Apple
      # account. The signed .ipa export (TestFlight) runs elsewhere once signing
      # creds exist; here we just prove the device build stays green.
      - name: Device build (unsigned compile-check)
        run: bash iOS/build-ios.sh device

  # Scaffold a fresh app with `mobiler new` and build it for Android. The demos are
  # older/customized, so this is the only thing that compiles the *template* Android
  # shell (Core.kt + its plugin registry) against the published core — catching
  # template drift (e.g. a broken DialogPlugin). The template iOS shell is covered
  # by the iOS lane (the demos' Core.swift is kept identical to it).
  scaffold:
    name: scaffold + build (template, Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust + Android targets
        run: rustup target add aarch64-linux-android x86_64-linux-android

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install the Android NDK pinned by the template
        run: |
          set +o pipefail
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses >/dev/null 2>&1 || true
          "$SDKMANAGER" "ndk;30.0.14904198"

      - name: Build the mobiler CLI
        run: cargo build -p mobiler

      - name: Scaffold a fresh app and build it for Android
        run: |
          MOBILER="$GITHUB_WORKSPACE/target/debug/mobiler"
          cd "$RUNNER_TEMP"
          "$MOBILER" new scaffold_test --package dev.mobiler.scaffoldtest
          cd scaffold_test
          "$MOBILER" build android

  # Coverage gate for the unit-testable logic (root workspace). The CLI's
  # process-spawning command modules (build/dev/doctor/watch/main) shell out to
  # gradle/adb/cargo and can't be unit-tested, so they're excluded; the gate then
  # reflects the testable surface (runtime, scaffold logic, codegen generator).
  coverage:
    name: coverage (root workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        run: rustup show
      - name: Add llvm-tools-preview
        run: rustup component add llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
      - name: Coverage (fail under 75% lines)
        run: >
          cargo llvm-cov --workspace --summary-only
          --fail-under-lines 75
          --ignore-filename-regex 'mobiler/src/(build|dev|doctor|watch|main)\.rs'
