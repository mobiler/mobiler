name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test-clippy:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # The mobiler CLI + runtime crates (root workspace)
          - name: cli
            dir: "."
          # Demos — each its own standalone workspace
          - name: demo-todo
            dir: demos/todo
          - name: demo-coffee
            dir: demos/coffee
          # Full-stack demo: native members only (domain + server + todo-core);
          # its mobile/web crates are excluded from this workspace.
          - name: demo-fullstack-todo
            dir: demos/fullstack-todo
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v5

      # Installs the toolchain + components + targets pinned by rust-toolchain.toml
      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.dir }}

      # Non-gating: pedantic warnings are surfaced in the log but do not fail the
      # build. clippy still fails on errors / failed compilation.
      - name: Clippy
        run: cargo clippy --workspace --all-targets

      - name: Test
        run: cargo test --workspace

  # The web shell is WASM-only (Leptos + gloo-net), so it's checked separately
  # against the wasm target rather than the host.
  web:
    name: web (mobiler-web, wasm)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobiler-web
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust + wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: mobiler-web

      - name: Build (wasm)
        run: cargo build --target wasm32-unknown-unknown

  # The web demos are full Trunk apps (the SAME cores as native, Widget→DOM via
  # mobiler-web). Trunk-build them so a shell change that breaks a demo is caught —
  # building is the CI-friendly check (running them needs a browser/server).
  web-demos:
    name: web demo (${{ matrix.dir }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir:
          - demos/coffee/web
          - demos/todo/web
          - demos/fullstack-todo/web-widgets
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust + wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.dir }}

      # Prebuilt Trunk binary (no third-party action / Node runtime). index.html sets
      # data-wasm-opt="0", so no wasm-opt/binaryen is needed.
      - name: Install Trunk
        run: |
          curl -fsSL https://github.com/trunk-rs/trunk/releases/download/v0.21.14/trunk-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xzf - -C "$HOME/.cargo/bin" trunk

      - name: Build (trunk)
        run: trunk build
