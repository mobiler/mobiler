name: Release

# Publishes the mobiler crate to crates.io when a v* tag is pushed, using
# crates.io Trusted Publishing (OIDC — no long-lived token stored in the repo).
#
# ── One-time setup on crates.io (required before this can succeed) ──
#   crates.io → mobiler → Settings → Trusted Publishing → "Add" with:
#     Repository owner:  mobiler
#     Repository name:   mobiler
#     Workflow filename: release.yml
#
# ── Cutting a release ──
#   1. Bump `version` in mobiler/Cargo.toml and commit.
#   2. git tag vX.Y.Z   (must match the Cargo.toml version)
#   3. git push origin vX.Y.Z

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        run: rustup show

      - name: Verify tag matches crate version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver="$(grep -m1 '^version' mobiler/Cargo.toml | cut -d'"' -f2)"
          echo "tag=$tag  crate version=$ver"
          if [ "$tag" != "$ver" ]; then
            echo "::error::tag v$tag does not match mobiler/Cargo.toml version $ver"
            exit 1
          fi

      - name: Authenticate to crates.io (Trusted Publishing)
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish
        run: cargo publish -p mobiler
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
