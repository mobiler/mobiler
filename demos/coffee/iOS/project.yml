# XcodeGen spec → Mobiler.xcodeproj (project-as-code, so the build is scriptable
# and reproducible — no hand-edited .pbxproj). `build-ios.sh` runs `xcodegen
# generate` then `xcodebuild`.
#
# VERIFY-ON-MAC: the fiddly part is linking the Rust static lib + its uniffi FFI
# (the modulemap / header / search paths). The settings below are the standard
# Crux-iOS shape; expect to adjust paths on the first MacinCloud build.
name: Coffee
options:
  bundleIdPrefix: dev.mobiler.coffee
  deploymentTarget:
    iOS: "16.0"

packages:
  # The facet-generated ABI types (Widget/Action/Effect/...), emitted by
  # `codegen --language swift` into generated/SharedTypes.
  SharedTypes:
    path: generated/SharedTypes

targets:
  Coffee:
    type: application
    platform: iOS
    sources:
      - Sources                       # App.swift, Core.swift, Render.swift
      - generated/shared.swift         # uniffi Swift wrapper (generated)
    dependencies:
      - package: SharedTypes
    info:
      path: Sources/Info.plist
      # xcodegen regenerates this plist from these properties on every build, so
      # launch-screen / orientation keys MUST live here — not just in the committed
      # Info.plist (which gets overwritten). Without UILaunchScreen iOS runs the app
      # letterboxed (black bars top/bottom) instead of full screen.
      properties:
        PRODUCT_BUNDLE_IDENTIFIER: dev.mobiler.coffee
        UILaunchScreen: {}
        # Rotation enabled for the demo so the responsive layout reflow can be tested on a
        # real device. The template stays portrait-only; apps opt into landscape per-app.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # This demo uses the camera capability (cx.capture_photo), so it ships the
        # iOS-required usage string (the user is prompted on first camera use).
        NSCameraUsageDescription: "Take a photo to attach to a coffee."
        # The biometric plugin uses Face ID (cx.plugin("biometric",…)).
        NSFaceIDUsageDescription: "Authenticate to unlock secure features."
        # Opt out of iPad multitasking (Split View needs all four orientations; we ship
        # three). Doesn't affect iPhone rotation.
        UIRequiresFullScreen: true
        # Declare no non-exempt encryption up front, so TestFlight builds aren't held on
        # the "Missing export compliance" question.
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.mobiler.coffee
        SWIFT_VERSION: "5.9"
        # TestFlight rejects a re-upload that reuses a build number, so bump
        # CURRENT_PROJECT_VERSION for each new build. Build 6 added biometric + securestore;
        # build 7 adds the websocket plugin (a "WS echo" button: connect to an echo server,
        # send, show the echoed frame).
        MARKETING_VERSION: "1.0"
        # Build 10 dogfoods the theming engine (terracotta Scaffold).
        CURRENT_PROJECT_VERSION: "10"
        # Link the Rust staticlib (built by build-ios.sh into generated/lib/).
        LIBRARY_SEARCH_PATHS: ["$(PROJECT_DIR)/generated/lib"]
        OTHER_LDFLAGS: ["-lshared"]
        # uniffi FFI modulemap so `shared.swift` finds the C symbols.
        SWIFT_INCLUDE_PATHS: ["$(PROJECT_DIR)/generated"]
        # App icon: actool builds the required sizes from the single 1024 source in
        # Sources/Assets.xcassets/AppIcon.appiconset and injects CFBundleIconName.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # The archive is built unsigned (build-ios.sh signs at export for App Store); the
        # simulator + device compile-check builds need no signing either.
        CODE_SIGNING_ALLOWED: "NO"

  # Behavioral UI test (the iOS twin of an instrumented Android test). Drives the
  # generic shell on the simulator to guard tap-routing regressions like the build-4
  # "image swallows the back-button tap" bug — a unit test can't catch those. Run with
  # `xcodebuild test -scheme Coffee` (CI's iOS lane does this for coffee). It's only
  # built for the `test` action (see the scheme below), so build-ios.sh's plain build +
  # unsigned device archive never touch it.
  CoffeeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    dependencies:
      - target: Coffee
    settings:
      base:
        SWIFT_VERSION: "5.9"
        CODE_SIGNING_ALLOWED: "NO"
        TEST_TARGET_NAME: Coffee

schemes:
  Coffee:
    build:
      targets:
        Coffee: all
        CoffeeUITests: [test]   # only built/run for `xcodebuild test`
    test:
      targets:
        - CoffeeUITests
