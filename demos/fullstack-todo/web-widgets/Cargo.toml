[package]
name = "web-widgets"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"

# The Widgetâ†’DOM web shell: hosts the SAME `todo-core` (compiled to WASM, driven
# via crux's `Core`) and renders its `Widget` tree to the DOM, fulfilling
# capabilities with `fetch`. This is, in effect, `mobiler-web`.
#
# Standalone workspace (own lockfile) â€” built with `trunk`, separate from the
# native demo workspace.
[workspace]

[dependencies]
todo-core = { path = "../todo-core" }
mobiler-core = { path = "../../../mobiler-core" }
crux_core = "0.18"
serde_json = "1"

leptos = { version = "0.7", features = ["csr"] }
gloo-net = "0.6"
wasm-bindgen-futures = "0.4"
console_error_panic_hook = "0.1"
